services:
  grafana:
    user: root
    container_name: 'nearform-otelinstrumentationgenerator-app'

    build:
      context: .
      args:
        grafana_image: ${GRAFANA_IMAGE:-grafana}
        grafana_version: ${GRAFANA_VERSION:-12.3.2}
        development: ${DEVELOPMENT:-true}
        anonymous_auth_enabled: ${ANONYMOUS_AUTH_ENABLED:-true}
    ports:
      - 3000:3000/tcp
    volumes:
      - ../dist:/var/lib/grafana/plugins/nearform-otelinstrumentationgenerator-app
      - ../provisioning:/etc/grafana/provisioning
      - ..:/root/nearform-otelinstrumentationgenerator-app

    environment:
      NODE_ENV: development
      GF_LOG_FILTERS: plugin.nearform-otelinstrumentationgenerator-app:debug
      GF_LOG_LEVEL: debug
      GF_DATAPROXY_LOGGING: 1
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: nearform-otelinstrumentationgenerator-app
